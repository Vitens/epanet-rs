<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="gEpanet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="gRs" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="gPar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="760" height="380" fill="#0d1117"/>

  <text x="380" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#e6edf3">
    Hydraulic Solver Performance
  </text>
  <text x="380" y="48" text-anchor="middle" font-size="12" fill="#64748b">
    25,742 nodes / 26,683 links — AWS c5.12xlarge (lower is better)
  </text>

  <!-- Plot area: x 90..720, y 75..310 (235 px for 2.5 s) -->
  <g stroke="#30363d" stroke-width="1">
    <line x1="90"  y1="310" x2="720" y2="310"/>
    <line x1="90"  y1="263" x2="720" y2="263"/>
    <line x1="90"  y1="216" x2="720" y2="216"/>
    <line x1="90"  y1="169" x2="720" y2="169"/>
    <line x1="90"  y1="122" x2="720" y2="122"/>
    <line x1="90"  y1="75"  x2="720" y2="75"/>
  </g>
  <g font-size="11" fill="#8b949e" text-anchor="end">
    <text x="82" y="314">0.0</text>
    <text x="82" y="267">0.5</text>
    <text x="82" y="220">1.0</text>
    <text x="82" y="173">1.5</text>
    <text x="82" y="126">2.0</text>
    <text x="82" y="79">2.5</text>
  </g>

  <line x1="90" y1="75"  x2="90"  y2="310" stroke="#e6edf3" stroke-width="1.5"/>
  <line x1="90" y1="310" x2="720" y2="310" stroke="#e6edf3" stroke-width="1.5"/>

  <text x="28" y="192" text-anchor="middle" font-size="12" fill="#e6edf3" transform="rotate(-90 28 192)">
    Execution time (s)
  </text>

  <g filter="url(#shadow)">
    <rect x="140" y="109.1" width="110" height="200.9" rx="6" fill="url(#gEpanet)"/>
  </g>
  <text x="195" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#e6edf3">1.00×</text>
  <text x="195" y="215" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">2.138 s</text>

  <g filter="url(#shadow)">
    <rect x="325" y="196.0" width="110" height="114.0" rx="6" fill="url(#gRs)"/>
  </g>
  <text x="380" y="187" text-anchor="middle" font-size="15" font-weight="700" fill="#e6edf3">1.76×</text>
  <text x="380" y="258" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">1.213 s</text>

  <g filter="url(#shadow)">
    <rect x="510" y="275.4" width="110" height="34.6" rx="6" fill="url(#gPar)"/>
  </g>
  <text x="565" y="266" text-anchor="middle" font-size="15" font-weight="700" fill="#e6edf3">5.81×</text>
  <text x="565" y="298" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">0.368 s</text>

  <g font-size="12" fill="#e6edf3" text-anchor="middle">
    <text x="195" y="332" font-weight="600">EPANET 2.3.5</text>
    <text x="195" y="348" fill="#8b949e" font-size="10">reference</text>

    <text x="380" y="332" font-weight="600">EPANET-RS</text>
    <text x="380" y="348" fill="#8b949e" font-size="10">sequential</text>

    <text x="565" y="332" font-weight="600">EPANET-RS</text>
    <text x="565" y="348" fill="#8b949e" font-size="10">parallel *</text>
  </g>

  <text x="380" y="370" text-anchor="middle" font-size="10" fill="#6e7681">
    * only for eligible (no tanks/controls/rules) models
  </text>
</svg>
