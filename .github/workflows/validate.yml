name: Validate EPANET Example Networks

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout epanet-rs
      uses: actions/checkout@v4

    - name: Build epanet-rs (release)
      run: cargo build --release

    - name: Build EPANET from source
      run: |
        git clone --depth 1 https://github.com/OpenWaterAnalytics/EPANET.git /tmp/epanet
        cmake -S /tmp/epanet -B /tmp/epanet/build -DCMAKE_BUILD_TYPE=Release
        cmake --build /tmp/epanet/build --config Release
        sudo cp /tmp/epanet/build/bin/runepanet /usr/local/bin/
        runepanet --help || true

    - name: Clone example networks
      run: git clone --depth 1 https://github.com/OpenWaterAnalytics/epanet-example-networks.git /tmp/example-networks

    - name: Validate all .inp files
      run: |
        EPANET_RS="./target/release/epanet-rs"
        IGNORE_FILE=".github/validate-ignore.list"
        PASS=0
        FAIL=0
        SKIP=0
        IGNORED=0
        ERRORS=""

        # Build newline-separated ignore list from file
        IGNORE_NAMES=""
        if [ -f "$IGNORE_FILE" ]; then
          while IFS='|' read -r fname reason; do
            fname=$(echo "$fname" | xargs)
            [ -z "$fname" ] && continue
            [[ "$fname" == \#* ]] && continue
            IGNORE_NAMES="${IGNORE_NAMES}${fname}"$'\n'
          done < "$IGNORE_FILE"
        fi

        for inp in $(find /tmp/example-networks -name '*.inp' | sort); do
          name=$(basename "$inp")
          ignored=false
          if echo "$IGNORE_NAMES" | grep -qFx "$name"; then
            ignored=true
          fi

          echo "::group::Validating $name"
          echo "--- $inp ---"

          if timeout 120 "$EPANET_RS" validate "$inp" --rtol 0.01 --atol 0.1; then
            echo "✅ PASSED: $name"
            PASS=$((PASS + 1))
          else
            exit_code=$?
            if [ $exit_code -eq 124 ]; then
              echo "⏱️ SKIPPED (timeout): $name"
              SKIP=$((SKIP + 1))
            elif [ "$ignored" = true ]; then
              reason=$(grep -F "$name" "$IGNORE_FILE" | head -1 | cut -d'|' -f2 | xargs)
              echo "::warning::$name failed but is on the ignore list: $reason"
              echo "⚠️ IGNORED (known failure): $name — $reason"
              IGNORED=$((IGNORED + 1))
            else
              echo "❌ FAILED: $name"
              FAIL=$((FAIL + 1))
              ERRORS="$ERRORS\n  - $name"
            fi
          fi
          echo "::endgroup::"
        done

        echo ""
        echo "=============================="
        echo "  Results: $PASS passed, $FAIL failed, $SKIP skipped, $IGNORED ignored"
        echo "=============================="

        if [ $IGNORED -gt 0 ]; then
          echo ""
          echo "Ignored networks ($IGNORED):"
          grep -v '^\s*#' "$IGNORE_FILE" | grep -v '^\s*$' | while IFS='|' read -r fname reason; do
            fname=$(echo "$fname" | xargs)
            reason=$(echo "$reason" | xargs)
            echo "  - $fname: $reason"
          done
        fi

        if [ $FAIL -gt 0 ]; then
          echo ""
          echo "Failed networks:"
          echo -e "$ERRORS"
          exit 1
        fi
