name: Benchmark EPANET-RS vs EPANET

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            epanet_url: https://github.com/OpenWaterAnalytics/EPANET/releases/download/v2.3.5/EPANET_2_3_5_LINUX_x86_64.zip
            hyperfine_deb: https://github.com/sharkdp/hyperfine/releases/download/v1.18.0/hyperfine_1.18.0_amd64.deb
            rs_binary: ./target/release/epanet-rs
          - os: windows-latest
            epanet_url: https://github.com/OpenWaterAnalytics/EPANET/releases/download/v2.3.5/EPANET_2_3_5_WIN_32_64.zip
            hyperfine_zip: https://github.com/sharkdp/hyperfine/releases/download/v1.18.0/hyperfine-v1.18.0-x86_64-pc-windows-msvc.zip
            rs_binary: ./target/release/epanet-rs.exe

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout epanet-rs
      uses: actions/checkout@v6

    - name: Build epanet-rs (release)
      run: cargo build --release

    # --- Install EPANET --------------------------------------------------------

    - name: Install EPANET 2.3.5 (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        wget -q "${{ matrix.epanet_url }}" -O /tmp/epanet.zip
        unzip -q /tmp/epanet.zip -d /tmp/epanet

        binary=$(find /tmp/epanet -type f -name 'runepanet' | head -n1)
        if [ -z "$binary" ]; then
          echo "runepanet binary not found in release archive" >&2
          find /tmp/epanet -maxdepth 3 -type f
          exit 1
        fi
        sudo install -m 0755 "$binary" /usr/local/bin/runepanet

        sudo mkdir -p /usr/local/lib/epanet
        libs=$(find /tmp/epanet -type f -name 'libepanet*.so*')
        if [ -z "$libs" ]; then
          echo "libepanet shared library not found in release archive" >&2
          find /tmp/epanet -maxdepth 3 -type f
          exit 1
        fi
        for lib in $libs; do
          sudo install -m 0644 "$lib" /usr/local/lib/epanet/
        done
        echo "/usr/local/lib/epanet" | sudo tee /etc/ld.so.conf.d/epanet.conf
        sudo ldconfig

        ldd /usr/local/bin/runepanet || true

    - name: Install EPANET 2.3.5 (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mkdir -p "$RUNNER_TEMP/epanet"
        curl -sSL "${{ matrix.epanet_url }}" -o "$RUNNER_TEMP/epanet.zip"
        unzip -q "$RUNNER_TEMP/epanet.zip" -d "$RUNNER_TEMP/epanet_raw"

        # Prefer the 64-bit build; fall back to anything if it isn't laid out
        # with explicit 32/64 subfolders.
        runexe=$(find "$RUNNER_TEMP/epanet_raw" -type f -iname 'runepanet.exe' | grep -i 64 | head -n1)
        if [ -z "$runexe" ]; then
          runexe=$(find "$RUNNER_TEMP/epanet_raw" -type f -iname 'runepanet.exe' | head -n1)
        fi
        if [ -z "$runexe" ]; then
          echo "runepanet.exe not found in release archive" >&2
          find "$RUNNER_TEMP/epanet_raw" -type f
          exit 1
        fi
        cp "$runexe" "$RUNNER_TEMP/epanet/"

        # Copy the matching DLL next to the exe so Windows loads it at runtime.
        dll=$(find "$(dirname "$runexe")" -maxdepth 1 -type f -iname 'epanet2*.dll' | head -n1)
        if [ -z "$dll" ]; then
          dll=$(find "$RUNNER_TEMP/epanet_raw" -type f -iname 'epanet2*.dll' | grep -i 64 | head -n1)
        fi
        if [ -z "$dll" ]; then
          dll=$(find "$RUNNER_TEMP/epanet_raw" -type f -iname 'epanet2*.dll' | head -n1)
        fi
        if [ -z "$dll" ]; then
          echo "epanet2.dll not found in release archive" >&2
          find "$RUNNER_TEMP/epanet_raw" -type f
          exit 1
        fi
        cp "$dll" "$RUNNER_TEMP/epanet/"

        # Publish on PATH for subsequent steps (GitHub expects a Windows path here)
        echo "$RUNNER_TEMP\\epanet" >> "$GITHUB_PATH"

    # --- Install hyperfine -----------------------------------------------------

    - name: Install hyperfine (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        wget -q "${{ matrix.hyperfine_deb }}" -O /tmp/hyperfine.deb
        sudo dpkg -i /tmp/hyperfine.deb

    - name: Install hyperfine (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mkdir -p "$RUNNER_TEMP/hyperfine"
        curl -sSL "${{ matrix.hyperfine_zip }}" -o "$RUNNER_TEMP/hyperfine.zip"
        unzip -q "$RUNNER_TEMP/hyperfine.zip" -d "$RUNNER_TEMP/hyperfine_raw"
        hf=$(find "$RUNNER_TEMP/hyperfine_raw" -type f -iname 'hyperfine.exe' | head -n1)
        cp "$hf" "$RUNNER_TEMP/hyperfine/"
        echo "$RUNNER_TEMP\\hyperfine" >> "$GITHUB_PATH"

    # --- Run benchmark ---------------------------------------------------------

    - name: Run benchmark
      run: |
        RS_BIN="${{ matrix.rs_binary }}"
        INP="benchmarks/benchmark.inp"
        RESULTS_DIR="benchmark-results"
        mkdir -p "$RESULTS_DIR"

        # Use a real file as EPANET's report output so the same command works on
        # both Linux and Windows (Windows has no /dev/null).
        EPANET_RPT="$RESULTS_DIR/epanet.rpt"

        hyperfine \
          --warmup 2 \
          --min-runs 5 \
          --export-json "$RESULTS_DIR/benchmark.json" \
          --export-markdown "$RESULTS_DIR/benchmark.md" \
          --command-name "EPANET" \
            "runepanet '$INP' '$EPANET_RPT'" \
          --command-name "EPANET-RS" \
            "$RS_BIN run '$INP' --quiet" \
          --command-name "EPANET-RS-parallel" \
            "$RS_BIN run '$INP' --quiet --parallel"

        epanet_ms=$(jq '.results[] | select(.command == "EPANET") | .mean * 1000' "$RESULTS_DIR/benchmark.json")
        rs_ms=$(jq '.results[] | select(.command == "EPANET-RS") | .mean * 1000' "$RESULTS_DIR/benchmark.json")
        rs_par_ms=$(jq '.results[] | select(.command == "EPANET-RS-parallel") | .mean * 1000' "$RESULTS_DIR/benchmark.json")
        speedup=$(echo "scale=2; $epanet_ms / $rs_ms" | bc)
        speedup_par=$(echo "scale=2; $epanet_ms / $rs_par_ms" | bc)

        {
          echo "## Benchmark Results (${{ matrix.os }})"
          echo ""
          echo "Network: \`$INP\`"
          echo ""
          echo "| Command | Mean (ms) | Speedup |"
          echo "|---------|-----------|---------|"
          printf "| EPANET | %.1f | 1.00x |\n" "$epanet_ms"
          printf "| EPANET-RS | %.1f | %sx |\n" "$rs_ms" "$speedup"
          printf "| EPANET-RS (parallel) | %.1f | %sx |\n" "$rs_par_ms" "$speedup_par"
          echo ""
          echo "### Hyperfine output"
          echo ""
          cat "$RESULTS_DIR/benchmark.md"
        } | tee -a "$GITHUB_STEP_SUMMARY"

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results-${{ matrix.os }}
        path: benchmark-results/
