name: Benchmark EPANET-RS vs EPANET

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout epanet-rs
      uses: actions/checkout@v6

    - name: Build epanet-rs (release)
      run: cargo build --release

    - name: Install EPANET 2.3.5 (prebuilt release)
      run: |
        wget -q https://github.com/OpenWaterAnalytics/EPANET/releases/download/v2.3.5/EPANET_2_3_5_LINUX_x86_64.zip -O /tmp/epanet.zip
        unzip -q /tmp/epanet.zip -d /tmp/epanet
        binary=$(find /tmp/epanet -type f -name 'runepanet' | head -n1)
        if [ -z "$binary" ]; then
          echo "runepanet binary not found in release archive" >&2
          find /tmp/epanet -maxdepth 3 -type f
          exit 1
        fi
        sudo install -m 0755 "$binary" /usr/local/bin/runepanet

    - name: Install hyperfine
      run: |
        wget -q https://github.com/sharkdp/hyperfine/releases/download/v1.18.0/hyperfine_1.18.0_amd64.deb
        sudo dpkg -i hyperfine_1.18.0_amd64.deb

    - name: Run benchmark
      run: |
        EPANET_RS="./target/release/epanet-rs"
        INP="benchmarks/benchmark.inp"
        RESULTS_DIR="benchmark-results"
        mkdir -p "$RESULTS_DIR"

        hyperfine \
          --warmup 2 \
          --min-runs 5 \
          --export-json "$RESULTS_DIR/benchmark.json" \
          --export-markdown "$RESULTS_DIR/benchmark.md" \
          --command-name "EPANET" \
            "runepanet '$INP' /dev/null" \
          --command-name "EPANET-RS" \
            "$EPANET_RS run '$INP' --quiet" \
          --command-name "EPANET-RS-parallel" \
            "$EPANET_RS run '$INP' --quiet --parallel"

        epanet_ms=$(jq '.results[] | select(.command == "EPANET") | .mean * 1000' "$RESULTS_DIR/benchmark.json")
        rs_ms=$(jq '.results[] | select(.command == "EPANET-RS") | .mean * 1000' "$RESULTS_DIR/benchmark.json")
        rs_par_ms=$(jq '.results[] | select(.command == "EPANET-RS-parallel") | .mean * 1000' "$RESULTS_DIR/benchmark.json")
        speedup=$(echo "scale=2; $epanet_ms / $rs_ms" | bc)
        speedup_par=$(echo "scale=2; $epanet_ms / $rs_par_ms" | bc)

        {
          echo "## Benchmark Results"
          echo ""
          echo "Network: \`$INP\`"
          echo ""
          echo "| Command | Mean (ms) | Speedup |"
          echo "|---------|-----------|---------|"
          printf "| EPANET | %.1f | 1.00x |\n" "$epanet_ms"
          printf "| EPANET-RS | %.1f | %sx |\n" "$rs_ms" "$speedup"
          printf "| EPANET-RS (parallel) | %.1f | %sx |\n" "$rs_par_ms" "$speedup_par"
          echo ""
          echo "### Hyperfine output"
          echo ""
          cat "$RESULTS_DIR/benchmark.md"
        } | tee -a "$GITHUB_STEP_SUMMARY"

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results
        path: benchmark-results/
